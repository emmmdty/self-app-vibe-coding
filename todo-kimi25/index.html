<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="现代化的待办事项管理应用">
    <title>待办事项 - Todo App</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- 设备与主题切换工具栏 -->
    <div class="device-toolbar">
        <div class="toolbar-section">
            <span class="toolbar-label">设备预览</span>
            <div class="device-buttons">
                <button class="device-btn active" data-device="desktop" aria-label="桌面视图">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="2" y="3" width="20" height="14" rx="2"/>
                        <line x1="8" y1="21" x2="16" y2="21"/>
                        <line x1="12" y1="17" x2="12" y2="21"/>
                    </svg>
                    电脑
                </button>
                <button class="device-btn" data-device="tablet" aria-label="平板视图">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="4" y="2" width="16" height="20" rx="2"/>
                        <line x1="12" y1="18" x2="12" y2="18"/>
                    </svg>
                    平板
                </button>
                <button class="device-btn" data-device="mobile" aria-label="手机视图">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="7" y="2" width="10" height="20" rx="2"/>
                        <line x1="12" y1="18" x2="12" y2="18"/>
                    </svg>
                    手机
                </button>
            </div>
        </div>
        <div class="toolbar-section">
            <span class="toolbar-label">主题</span>
            <div class="theme-buttons">
                <button class="theme-btn active" data-theme="blue" aria-label="蓝色主题"></button>
                <button class="theme-btn" data-theme="green" aria-label="绿色主题"></button>
                <button class="theme-btn" data-theme="purple" aria-label="紫色主题"></button>
                <button class="theme-btn" data-theme="orange" aria-label="橙色主题"></button>
                <button class="theme-btn" data-theme="pink" aria-label="粉色主题"></button>
                <button class="theme-btn" data-theme="cyan" aria-label="青色主题"></button>
                <button class="theme-btn" data-theme="red" aria-label="红色主题"></button>
                <button class="theme-btn" data-theme="dark" aria-label="深色主题"></button>
            </div>
        </div>
        <div class="toolbar-section">
            <span class="toolbar-label">自定义</span>
            <div class="color-picker-wrapper">
                <input type="color" id="custom-color" class="color-picker" value="#4a90e2" aria-label="选择自定义颜色">
                <span class="color-picker-label">自选颜色</span>
            </div>
        </div>
    </div>

    <!-- 应用主容器 -->
    <div class="app-wrapper device-desktop" id="app-container">
        <div class="app-layout">
            <!-- 侧边栏 -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="user-profile">
                        <div class="user-avatar">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                <circle cx="12" cy="7" r="4"/>
                            </svg>
                        </div>
                        <span class="user-name">我的任务</span>
                    </div>
                </div>
                
                <nav class="sidebar-nav">
                    <ul class="nav-list" id="nav-list">
                        <!-- 智能列表 -->
                        <li class="nav-item">
                            <button class="nav-btn active" data-list-id="my-day" data-smart="true">
                                <span class="nav-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="5"/>
                                        <line x1="12" y1="1" x2="12" y2="3"/>
                                        <line x1="12" y1="21" x2="12" y2="23"/>
                                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
                                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                                        <line x1="1" y1="12" x2="3" y2="12"/>
                                        <line x1="21" y1="12" x2="23" y2="12"/>
                                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
                                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                                    </svg>
                                </span>
                                <span class="nav-text">我的一天</span>
                                <span class="nav-count" id="count-my-day">0</span>
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-btn" data-list-id="important" data-smart="true">
                                <span class="nav-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                                    </svg>
                                </span>
                                <span class="nav-text">重要</span>
                                <span class="nav-count" id="count-important">0</span>
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-btn" data-list-id="planned" data-smart="true">
                                <span class="nav-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                        <line x1="16" y1="2" x2="16" y2="6"/>
                                        <line x1="8" y1="2" x2="8" y2="6"/>
                                        <line x1="3" y1="10" x2="21" y2="10"/>
                                    </svg>
                                </span>
                                <span class="nav-text">计划内</span>
                                <span class="nav-count" id="count-planned">0</span>
                            </button>
                        </li>
                        <li class="nav-item">
                            <button class="nav-btn" data-list-id="all" data-smart="true">
                                <span class="nav-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                                    </svg>
                                </span>
                                <span class="nav-text">全部</span>
                                <span class="nav-count" id="count-all">0</span>
                            </button>
                        </li>
                    </ul>
                    
                    <div class="nav-divider"></div>
                    
                    <!-- 自定义列表 -->
                    <div class="custom-lists-header">
                        <span class="custom-lists-title">列表</span>
                        <button class="add-list-btn" id="add-list-btn" aria-label="新建列表">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19"/>
                                <line x1="5" y1="12" x2="19" y2="12"/>
                            </svg>
                        </button>
                    </div>
                    <ul class="nav-list" id="custom-lists">
                        <!-- 动态生成的自定义列表 -->
                    </ul>
                </nav>
            </aside>

            <!-- 主内容区 -->
            <main class="main-content">
                <!-- 列表标题 -->
                <header class="list-header">
                    <h1 class="list-title" id="list-title">我的一天</h1>
                    <div class="list-meta">
                        <span class="list-date" id="list-date"></span>
                    </div>
                </header>

                <!-- 输入区域 -->
                <div class="input-section">
                    <form class="todo-form" id="todo-form">
                        <div class="todo-input-wrapper">
                            <span class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="12" y1="5" x2="12" y2="19"/>
                                    <line x1="5" y1="12" x2="19" y2="12"/>
                                </svg>
                            </span>
                            <input 
                                type="text" 
                                id="todo-input" 
                                class="todo-input" 
                                placeholder="添加任务..." 
                                autocomplete="off"
                                maxlength="200"
                                aria-label="输入任务内容"
                            >
                        </div>
                    </form>
                </div>

                <!-- 筛选标签 -->
                <div class="filter-tabs" id="filter-tabs">
                    <button class="filter-tab active" data-filter="all">全部</button>
                    <button class="filter-tab" data-filter="active">进行中</button>
                    <button class="filter-tab" data-filter="completed">已完成</button>
                </div>

                <!-- 任务列表区域 -->
                <div class="todo-list-container">
                    <ul class="todo-list" id="todo-list" role="list" aria-label="任务列表"></ul>
                    
                    <!-- 空状态 -->
                    <div class="empty-state" id="empty-state">
                        <div class="empty-illustration">
                            <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <circle cx="100" cy="100" r="80" stroke="currentColor" stroke-width="2" stroke-dasharray="8 8" opacity="0.3"/>
                                <path d="M70 100L90 120L130 80" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
                            </svg>
                        </div>
                        <h2 class="empty-title">专注于你的一天</h2>
                        <p class="empty-text">添加任务来规划你的一天</p>
                    </div>
                </div>

                <!-- 已完成任务折叠区 -->
                <div class="completed-section" id="completed-section">
                    <button class="completed-toggle" id="completed-toggle">
                        <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="6 9 12 15 18 9"/>
                        </svg>
                        <span class="completed-text">已完成</span>
                        <span class="completed-count" id="completed-count">0</span>
                    </button>
                    <ul class="todo-list completed-list" id="completed-list"></ul>
                </div>
            </main>

            <!-- 任务详情面板 -->
            <aside class="detail-panel" id="detail-panel">
                <div class="detail-header">
                    <button class="close-detail-btn" id="close-detail-btn" aria-label="关闭详情">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>
                
                <div class="detail-content">
                    <div class="detail-task-item">
                        <div class="detail-checkbox-wrapper">
                            <input type="checkbox" class="detail-checkbox" id="detail-checkbox">
                            <span class="detail-checkmark"></span>
                        </div>
                        <input type="text" class="detail-task-text" id="detail-task-text">
                        <button class="detail-important-btn" id="detail-important-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                            </svg>
                        </button>
                    </div>

                    <div class="detail-sections">
                        <div class="detail-section">
                            <div class="detail-row">
                                <span class="detail-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                                        <line x1="16" y1="2" x2="16" y2="6"/>
                                        <line x1="8" y1="2" x2="8" y2="6"/>
                                        <line x1="3" y1="10" x2="21" y2="10"/>
                                    </svg>
                                </span>
                                <div class="detail-field">
                                    <label class="detail-label">截止日期</label>
                                    <input type="date" class="detail-input" id="detail-due-date">
                                </div>
                            </div>
                        </div>

                        <div class="detail-section">
                            <div class="detail-row">
                                <span class="detail-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="12" r="10"/>
                                        <polyline points="12 6 12 12 16 14"/>
                                    </svg>
                                </span>
                                <div class="detail-field">
                                    <label class="detail-label">提醒</label>
                                    <select class="detail-select" id="detail-reminder">
                                        <option value="">无</option>
                                        <option value="0">准时</option>
                                        <option value="15">提前15分钟</option>
                                        <option value="30">提前30分钟</option>
                                        <option value="60">提前1小时</option>
                                        <option value="1440">提前1天</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="detail-section">
                            <div class="detail-row">
                                <span class="detail-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                                        <polyline points="14 2 14 8 20 8"/>
                                        <line x1="16" y1="13" x2="8" y2="13"/>
                                        <line x1="16" y1="17" x2="8" y2="17"/>
                                        <polyline points="10 9 9 9 8 9"/>
                                    </svg>
                                </span>
                                <div class="detail-field">
                                    <label class="detail-label">备注</label>
                                    <textarea class="detail-textarea" id="detail-note" placeholder="添加备注..."></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="detail-section subtasks-section">
                            <div class="detail-row">
                                <span class="detail-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <line x1="8" y1="6" x2="21" y2="6"/>
                                        <line x1="8" y1="12" x2="21" y2="12"/>
                                        <line x1="8" y1="18" x2="21" y2="18"/>
                                        <line x1="3" y1="6" x2="3.01" y2="6"/>
                                        <line x1="3" y1="12" x2="3.01" y2="12"/>
                                        <line x1="3" y1="18" x2="3.01" y2="18"/>
                                    </svg>
                                </span>
                                <div class="detail-field">
                                    <label class="detail-label">步骤</label>
                                    <div class="subtasks-list" id="subtasks-list"></div>
                                    <div class="add-subtask-wrapper">
                                        <input type="text" class="add-subtask-input" id="add-subtask-input" placeholder="添加步骤...">
                                        <button class="add-subtask-btn" id="add-subtask-btn">添加</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="detail-footer">
                        <span class="detail-created" id="detail-created"></span>
                        <button class="delete-task-btn" id="delete-task-btn">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                            </svg>
                            删除任务
                        </button>
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- 加载 JavaScript -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
