name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  node-project-checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: money-one-liner
            path: money-one-liner
            verify: npm test
          - name: texas-holdem-multiplayer
            path: texas-holdem-multiplayer
            verify: npm test
          - name: todoList
            path: todoList
            verify: npm run build && npm run test
          - name: todo-kimi25
            path: todo-kimi25
            verify: npx tsc -p tsconfig.json --noEmit

    defaults:
      run:
        shell: bash
        working-directory: ${{ matrix.path }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            texas-holdem-multiplayer/package-lock.json
            todoList/package-lock.json
            todo-kimi25/package-lock.json

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Verify ${{ matrix.name }}
        run: ${{ matrix.verify }}
